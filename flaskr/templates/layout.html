<!DOCTYPE html>

<html lang="en">

  <head>

    <!-- Common tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">

    <!-- Bootstrap 5.3.8 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}" type="text/css">

    <!-- Page title -->
    <title>CultiCore > {% block title %}{% endblock %}</title>

    <!-- Per page scripts, should be deferred. -->
    {% block scripts %}{% endblock %}

  </head>

  <body>
    {% if g.user %}
    
    <nav class="navbar navbar-expand-lg sticky-top bg-light" data-bs-theme="light">
      <div class="container">

        <a class="navbar-brand" href="{{ url_for('cultivation_plots.index') }}">
          CultiCore
        </a>

        <form class="d-flex ms-auto" method="POST" action="{{ url_for('auth.logout') }}">
          <button type="submit" class="btn btn-secondary btn-sm">Sign out</button>
        </form>

      </div>
    </nav>

    {% endif %}

    <div class="container mt-3">
      {% with messages = get_flashed_messages(with_categories=True) %}

      {% if messages %}

      <div class="alert alert-{{ messages[0][0] }} mb-5" role="alert">
        {{ messages[0][1] }}
      </div>

      {% endif %}

      {% endwith %}

      {% block content %}{% endblock %}

    </div>

    <!-- Bootstrap 5.3.8 scripts with Popper.js -->
    <script src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>

  </body>

</html>
