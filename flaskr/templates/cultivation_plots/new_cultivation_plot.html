{% extends "layout.html" %}

{% block title %}

New cultivation plot

{% endblock %}

{% block content %}

<main class="row mt-5">
  <h1 class="text-center mb-0 col-12">Create a cultivation plot</h1>

  <form enctype="multipart/form-data" method="POST" action="{{ url_for('cultivation_plots.new_cultivation_plot') }}" class="col-12 p-4 mt-4">
    <div class="mb-3">
      <label class="form-label" for="name">Name</label>
      <input class="form-control" type="text" name="name" id="name" required>
    </div>

    <div class="d-grid">
      <button type="submit" class="btn btn-primary">Create</button>
    </div>
  </form>
</main>

{% endblock %}
