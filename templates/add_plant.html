{% extends "layout.html" %}

{% block title %}

Add a plant

{% endblock %}

{% block content %}

<main class="row mt-5">
  <h1 class="text-center mb-0 col-12">Add your plant</h1>

  <form method="POST" action="{{ url_for('add_plant') }}" class="col-12 p-4 mt-4">
    <div class="mb-3">
      <label class="form-label" for="name">Name</label>
      <input class="form-control" type="text" name="name" id="name" required>
    </div>

    <div class="mb-5">
      <label class="form-label" for="picture">Picture</label>
      <input class="form-control" type="file" name="picture" id="picture" required>
    </div>

    <div class="d-grid">
      <button type="submit" class="btn btn-primary">Add plant</button>
    </div>
  </form>
</main>

{% endblock %}
