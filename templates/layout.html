<!DOCTYPE html>

<html lang="en">

  <head>

    <!-- Common tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">

    <!-- The favicon! -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">

    <!-- Bootstrap 5.3.8 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}" type="text/css">

    <!-- Page title -->
    <title>Water me! {% block title %}{% endblock %}</title>

    <!-- Per page scripts, should be deferred. -->
    {% block scripts %}{% endblock %}

  </head>

  <body>

    <header>
      <h1>Water me!</h1>
    </header>

    {% with messages = get_flashed_messages(with_categories=True) %}
    
    {% if messages %}

    <div class="alert alert-{{ messages[0][0] }}" role="alert">
      {{ messages[0][1] }}
    </div>

    {% endif %}

    {% endwith %}

    {% block content %}{% endblock %}

    {% if 'user_id' in session %}

    <form method="POST" action="{{ url_for('sign_out') }}">
      <button type="submit">Sign out</button>
    </form>

    {% endif %}

    <!-- Bootstrap 5.3.8 scripts with Popper.js -->
    <script src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>

  </body>

</html>
